# Model Configuration for BALF Cell Classification Pipeline
# Switch between different feature extraction backends by changing model_name.

model_name: biomedclip   # Options: biomedclip, dinov2
device: auto             # auto / cuda / cpu

# Multi-scale feature encoding parameters
cell_margin_ratio: 0.15
context_margin_ratio: 0.30
background_value: 128
cell_scale_weight: 0.90
context_scale_weight: 0.10

# DINOv2-specific
# variant: dinov2_vits14  # dinov2_vits14, dinov2_vitb14, dinov2_vitl14

# Prompt Tuning
prompt_tuning:
  enabled: false
  n_ctx: 4
  lr: 0.002
  epochs: 50
  temperature: 0.01

# Morphology Constraints
morphology_constraints:
  enabled: true
  strength: 1.0

# Hybrid Classifier Weights
hybrid_weights:
  global_image_weight: 1.0
  global_text_weight: 0.0
  adaptive_image_weight: 1.0
  support_temperature: 0.05
  final_temperature: 0.03
